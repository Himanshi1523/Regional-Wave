<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Website - Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background: url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=MnwzNjUyOXwwfDF8c2VhcmNofDN8fGJsdWUlMjBza3l8fDB8fHx8MTYyNzIwMjYwNg&ixlib=rb-1.2.1&q=80&w=1080') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding-top: 60px; /* Adjust for fixed translate dropdown */
        }

        /* Google Translate dropdown styling */
        #google_translate_element {
            position: fixed;
            top: 10px;
            right: 20px;
            z-index: 9999;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.6); /* Darker background for better contrast */
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            animation: zoomIn 1s ease-out, fadeIn 1s ease-in-out;
        }

        .form-wrapper {
            background-color: rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 360px;
            transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
            text-align: center;
            position: relative;
            opacity: 0;
            transform: translateY(20px);
        }

        .form-wrapper.show {
            opacity: 1;
            transform: translateY(0);
        }

        .form-wrapper h2 {
            text-align: center;
            margin-bottom: 24px;
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
        }

        .form-wrapper label {
            font-size: 14px;
            color: #ffffff;
            margin-bottom: 6px;
            display: block;
        }

        .form-wrapper input {
            width: calc(100% - 24px);
            padding: 12px;
            margin-bottom: 18px;
            border: none;
            border-radius: 8px;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.3);
            color: #333; /* Darker font color */
            font-size: 14px;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        .form-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.8);
        }

        .form-wrapper input:focus {
            outline: none;
            background-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.3);
        }

        .form-wrapper button {
            width: 100%;
            padding: 12px;
            background-color: #00c6ff;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: background-color 0.3s, transform 0.2s, box-shadow 0.3s;
            box-shadow: 0 4px 8px rgba(0, 198, 255, 0.3);
        }

        .form-wrapper button:hover {
            background-color: #007bff;
            box-shadow: 0 6px 12px rgba(0, 123, 255, 0.5);
            transform: scale(1.05);
        }

        .form-wrapper button:active {
            transform: scale(0.98);
        }

        .forgot-password-link, .signup-link {
            display: block;
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
            color: #00c6ff;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .forgot-password-link:hover, .signup-link:hover {
            color: #007bff;
        }

        .signup-statement {
            display: block;
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
            color: #ffffff;
        }

        /* Animations */
        @keyframes zoomIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
            }
        }

        .forgot-password-form, .login-form {
            display: none;
        }

        .form-active {
            display: block;
            animation: fadeIn 0.5s ease-in;
        }

        #otp-form, #new-password-form {
            display: none;
        }

        @media (max-width: 500px) {
            .form-wrapper {
                padding: 20px;
            }

            .form-wrapper input {
                padding: 10px;
            }

            .form-wrapper button {
                padding: 10px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- Google Translate Element -->
    <div id="google_translate_element"></div>

    <div class="login-container">
        <div class="form-wrapper login-form form-active show">
            <h2>Login</h2>
            <form id="loginForm">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>

                <div class="remember">
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    <label for="rememberMe">Remember Me</label>
                </div>

                <button type="submit">Login</button>
                <a class="forgot-password-link" onclick="showForgotPasswordForm()">Forgot Password?</a>
                <span class="signup-statement">Don't have an account?</span>
                <a class="signup-link" onclick="openSignUpPage()">Sign Up</a>
            </form>
        </div>

        <div class="form-wrapper forgot-password-form">
            <h2>Forgot Password</h2>
            <form id="forgotPasswordForm">
                <label for="contact">Enter Email or Contact Number:</label>
                <input type="text" id="contact" name="contact" placeholder="Enter email or contact number" required>

                <button type="submit">Send OTP</button>
            </form>

            <div id="otp-form">
                <h2>Verify OTP</h2>
                <form id="otpForm">
                    <label for="otp">Enter OTP:</label>
                    <input type="text" id="otp" name="otp" placeholder="Enter OTP" required>
                    
                    <button type="submit">Verify OTP</button>
                </form>
            </div>

            <div id="new-password-form">
                <h2>Create New Password</h2>
                <form id="newPasswordForm">
                    <label for="newPassword">New Password:</label>
                    <input type="password" id="newPassword" name="newPassword" placeholder="Enter new password" required>
                    
                    <button type="submit">Update Password</button>
                </form>
            </div>
        </div>
    </div>

    <script>
    function googleTranslateElementInit() {
        new google.translate.TranslateElement({
            pageLanguage: 'en',
            includedLanguages: 'en,hi,bn,ta,te,ml,gu,mr,kn,or,as,pa,ur,si,ne,ml,sa,ja,ko,fr,de,es,it,pt,ar',
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE
        }, 'google_translate_element');
    }
    (function() {
        var gt = document.createElement('script');
        gt.type = 'text/javascript';
        gt.async = true;
        gt.src = 'https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
        var s = document.getElementsByTagName('script')[0];
        s.parentNode.insertBefore(gt, s);
    })();
    </script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const rememberMe = document.getElementById("rememberMe").checked;

            if (username && password) {
                if (rememberMe) {
                    alert(`Login successful! Password Remembered`);
                } else {
                    alert(`Login successful!`);
                }
                // Redirect to the news page (placeholder URL)
                // window.location.href = `/news`;
            } else {
                alert('Please fill in all fields');
            }
        });

        function showForgotPasswordForm() {
            const loginForm = document.querySelector('.login-form');
            const forgotPasswordForm = document.querySelector('.forgot-password-form');

            loginForm.classList.remove('form-active');
            loginForm.classList.add('fade-out');
            setTimeout(() => {
                loginForm.classList.remove('form-active');
                loginForm.classList.remove('fade-out');
                forgotPasswordForm.classList.add('form-active');
                forgotPasswordForm.classList.add('show');
            }, 300);
        }

        function openSignUpPage() {
            window.open('signup.html', '_blank');
        }

        document.getElementById('forgotPasswordForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const contact = document.getElementById("contact").value;
            alert(`OTP sent to ${contact}`);
            document.getElementById('otp-form').style.display = 'block';
        });

        document.getElementById('otpForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const otp = document.getElementById("otp").value;
            if (otp) {
                document.getElementById('new-password-form').style.display = 'block';
                alert('OTP verified');
            } else {
                alert('Invalid OTP');
            }
        });

        document.getElementById('newPasswordForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const newPassword = document.getElementById("newPassword").value;
            if (newPassword) {
                alert('Password updated successfully');
                document.querySelector('.forgot-password-form').classList.remove('form-active');
                document.querySelector('.forgot-password-form').classList.add('fade-out');
                setTimeout(() => {
                    document.querySelector('.forgot-password-form').classList.remove('fade-out');
                    document.querySelector('.login-form').classList.add('form-active');
                    document.querySelector('.login-form').classList.add('show');
                }, 300);
            } else {
                alert('Please enter a new password');
            }
        });
    </script>
<script>
    function loadSettings() {
        // Apply theme
        const theme = localStorage.getItem('theme') || 'light';
        document.body.className = theme === 'dark' ? 'dark-mode' : '';

        // Apply font size
        const fontSize = localStorage.getItem('font-size') || 'medium';
        document.documentElement.style.fontSize = fontSize === 'large' ? '18px' : fontSize === 'small' ? '12px' : '16px';

        // Apply layout view
        const layoutView = localStorage.getItem('layout-view') || 'list';
        applyLayoutView(layoutView);
    }

    function applyLayoutView(view) {
        if (view === 'grid') {
            document.body.classList.add('grid-layout');
            document.body.classList.remove('list-layout');
        } else {
            document.body.classList.add('list-layout');
            document.body.classList.remove('grid-layout');
        }
    }

    window.onload = loadSettings;
</script>

</body>
</html>
