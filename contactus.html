<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Contact Us - NewsWebsite</title>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding-top: 60px; /* Adjusted for fixed dropdown */
        }

        /* Fixed position for Google Translate dropdown */
        #google_translate_element {
            position: fixed;
            top: 10px;
            right: 20px;
            z-index: 9999; /* Ensures it stays on top */
        }

        .contact-container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            padding: 30px;
            width: 90%;
            max-width: 800px;
            text-align: center;
        }

        .contact-container h1 {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 20px;
        }

        .contact-container p {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 30px;
        }

        .contact-container form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .contact-container form .form-group {
            width: 100%;
            margin-bottom: 20px;
        }

        .contact-container form .form-group label {
            font-size: 1.1rem;
            color: #333;
            display: block;
            margin-bottom: 8px;
        }

        .contact-container form .form-group input,
        .contact-container form .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }

        .contact-container form .form-group input:focus,
        .contact-container form .form-group textarea:focus {
            border-color: #6a11cb;
            outline: none;
            box-shadow: 0 0 8px rgba(106, 17, 203, 0.2);
        }

        .contact-container form .form-group textarea {
            height: 150px;
            resize: none;
        }

        .contact-container form button {
            background-color: #2575fc;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .contact-container form button:hover {
            background-color: #6a11cb;
        }

        .contact-container .contact-info {
            margin-top: 30px;
        }

        .contact-container .contact-info p {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 10px;
        }

        .contact-container .contact-info a {
            color: #2575fc;
            text-decoration: none;
            font-weight: bold;
        }

        .contact-container .contact-info a:hover {
            text-decoration: underline;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .contact-container h1 {
                font-size: 2rem;
            }

            .contact-container p {
                font-size: 1rem;
            }

            .contact-container form button {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Google Translate Element at the top of the page -->
    <div id="google_translate_element"></div>

    <div class="contact-container">
        <h1>Contact Us</h1>
        <p>We'd love to hear from you! Fill out the form below or reach us directly through email.</p>

        <form action="submit_contact.php" method="POST">
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" required placeholder="Enter your name">
            </div>

            <div class="form-group">
                <label for="email">Your Email</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="message">Your Message</label>
                <textarea id="message" name="message" required placeholder="Write your message"></textarea>
            </div>

            <button type="submit">Send Message</button>
        </form>

        <div class="contact-info">
            <p>You can also reach us at:</p>
            <p>Email: <a href="mailto:support@newswebsite.com">support@newswebsite.com</a></p>
            <p>Phone: (123) 456-7890</p>
        </div>
    </div>

    <!-- Google Translate Script -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,hi,bn,te,ta,ml,kn,mr,gu,pa,or,as,ur,sn,ks,sd,ne,bo,si,mni,brx,doi,kok,ks,mlt,sat,mai,dz,sog,bh,kha',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
