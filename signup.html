<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - News Website</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Caveat:wght@500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://source.unsplash.com/featured/?abstract,colorful') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200 vh;
            animation: backgroundFade 5s infinite;
            color: #333;
        }

        @keyframes backgroundFade {
            0% {
                filter: brightness(100%);
            }

            50% {
                filter: brightness(80%);
            }

            100% {
                filter: brightness(100%);
            }
        }

        .signup-container {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
            text-align: center;
            animation: slideDown 1s ease-out;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        h2 {
            margin-bottom: 15px;
            font-size: 3rem;
            font-family: 'Caveat', cursive;
            color: #ffffff;
            letter-spacing: 2px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #ffffff;
            text-align: left;
            font-size: 1.1rem;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="password"],
        input[type="number"] {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            width: 100%;
            transition: box-shadow 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        input[type="password"]:focus,
        input[type="number"]:focus {
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
            outline: none;
        }

        .otp-container {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
        }

        .verify-btn {
            background: linear-gradient(45deg, #FF6F61, #D91E3A);
            color: white;
            padding: 10px;
            font-size: 0.9rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
            width: 100%;
        }

        .verify-btn:hover {
            box-shadow: 0 0 15px rgba(255, 105, 97, 0.6);
        }

        .submit-btn {
            background: linear-gradient(45deg, #28B463, #239B56);
            color: white;
            padding: 10px;
            font-size: 0.9rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
            width: 100%;
        }

        .submit-btn:hover {
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.6);
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            text-align: left;
        }

        .checkbox-container input[type="checkbox"] {
            margin-right: 10px;
        }

        .rules {
            font-size: 0.9rem;
            margin-bottom: 20px;
            color: #ffffff;
            text-align: left;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }

        .rules li {
            color: red;
        }

        .rules li.valid {
            color: #2ecc71;
        }

        .or {
            position: relative;
            text-align: center;
            margin: 20px 0;
            font-size: 1rem;
            color: #ffffff;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }

        .or::before,
        .or::after {
            content: '';
            position: absolute;
            width: 45%;
            height: 1px;
            background: #ffffff;
            top: 50%;
        }

        .or::before {
            left: 0;
        }

        .or::after {
            right: 0;
        }

        .error {
            color: red;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        @media (max-width: 500px) {
            .signup-container {
                padding: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="signup-container">
        <h2>Create Your Account</h2>
        <form id="signupForm" onsubmit="validateForm(event)">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required>

            <label for="signup-method">Signup with</label>
            <div class="otp-container">
                <input type="email" id="email" name="email" placeholder="Enter your email">
                <button type="button" class="verify-btn" onclick="sendOTP('email')">Send OTP</button>
            </div>

            <p class="or">OR</p>
            <div class="otp-container">
                <input type="tel" id="contact" name="contact" placeholder="Enter your contact number">
                <button type="button" class="verify-btn" onclick="sendOTP('contact')">Send OTP</button>
            </div>

            <div id="otp-section" style="display:none;">
                <label for="otp">Enter OTP</label>
                <input type="number" id="otp" name="otp" placeholder="Enter the OTP received" required>
            </div>

            <label for="password">Create Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required oninput="checkPassword()">

            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required oninput="checkPasswordMatch()">

            <div class="rules">
                <p>Password must contain:</p>
                <ul id="password-rules">
                    <li id="min-char">At least 8 characters</li>
                    <li id="uppercase">One uppercase letter</li>
                    <li id="lowercase">One lowercase letter</li>
                    <li id="number">One number</li>
                    <li id="special-char">One special character (@, #, $, etc.)</li>
                </ul>
            </div>

            <div id="password-match-error" class="error-message"></div>

            <div class="checkbox-container">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I agree to the <a href="C:\hackathon\hackathon complete codes\Termsofservices.html" target="_blank">Terms of Service</a> and <a href="privacypolicy.html" target="_blank">Privacy Policy</a></label>
            </div>

            <div id="error-message" class="error-message"></div>

            <button type="submit" class="submit-btn">Sign Up</button>
        </form>
    </div>

    <script>
        function sendOTP(method) {
            if (method === 'email') {
                const email = document.getElementById('email').value;
                if (email) {
                    document.getElementById('otp-section').style.display = 'block';
                } else {
                    alert("Please enter your email to receive an OTP");
                }
            } else if (method === 'contact') {
                const contact = document.getElementById('contact').value;
                if (contact) {
                    document.getElementById('otp-section').style.display = 'block';
                } else {
                    alert("Please enter your contact number to receive an OTP");
                }
            }
        }

        function checkPassword() {
            const password = document.getElementById("password").value;
            const minChar = document.getElementById("min-char");
            const uppercase = document.getElementById("uppercase");
            const lowercase = document.getElementById("lowercase");
            const number = document.getElementById("number");
            const specialChar = document.getElementById("special-char");

            if (password.length >= 8) minChar.classList.add("valid");
            else minChar.classList.remove("valid");

            if (/[A-Z]/.test(password)) uppercase.classList.add("valid");
            else uppercase.classList.remove("valid");

            if (/[a-z]/.test(password)) lowercase.classList.add("valid");
            else lowercase.classList.remove("valid");

            if (/\d/.test(password)) number.classList.add("valid");
            else number.classList.remove("valid");

            if (/[@#$%^&*!]/.test(password)) specialChar.classList.add("valid");
            else specialChar.classList.remove("valid");
        }

        function checkPasswordMatch() {
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirm-password").value;
            const matchError = document.getElementById("password-match-error");

            if (password !== confirmPassword) {
                matchError.textContent = "Passwords do not match!";
            } else {
                matchError.textContent = "";
            }
        }

        function validateForm(event) {
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirm-password").value;
            const errorMessage = document.getElementById("error-message");

            if (password !== confirmPassword) {
                errorMessage.textContent = "Passwords do not match!";
                event.preventDefault();
            }
        }
    </script>
<script>
    function loadSettings() {
        // Apply theme
        const theme = localStorage.getItem('theme') || 'light';
        document.body.className = theme === 'dark' ? 'dark-mode' : '';

        // Apply font size
        const fontSize = localStorage.getItem('font-size') || 'medium';
        document.documentElement.style.fontSize = fontSize === 'large' ? '18px' : fontSize === 'small' ? '12px' : '16px';

        // Apply layout view
        const layoutView = localStorage.getItem('layout-view') || 'list';
        applyLayoutView(layoutView);
    }

    function applyLayoutView(view) {
        if (view === 'grid') {
            document.body.classList.add('grid-layout');
            document.body.classList.remove('list-layout');
        } else {
            document.body.classList.add('list-layout');
            document.body.classList.remove('grid-layout');
        }
    }

    window.onload = loadSettings;
</script>


    <div id="google_translate_element"></div> <!-- Google Translate Element -->
</body>

</html>
