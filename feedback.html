<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Feedback Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff4b8e, #8a2be2, #00bfff); /* Gradient from pink to purple to blue */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200vh; /* Adjust height */
        }

        .feedback-container {
            background: linear-gradient(145deg, #f9f9f9, #ffccd5); /* Light gradient for the container */
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
            font-family: 'Roboto', sans-serif; /* Stylish font */
        }

        h1 {
            text-align: center;
            color: #4e4e4e;
            font-size: 2em;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .form-section {
            margin-bottom: 20px;
        }

        .form-section label {
            font-size: 1.1em;
            margin-bottom: 10px;
            display: block;
            color: #333;
            font-weight: bold;
        }

        .form-section input, .form-section select, .form-section textarea {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1em;
            color: #333;
            transition: all 0.3s ease;
        }

        .form-section input:focus, .form-section select:focus, .form-section textarea:focus {
            border-color: #8a2be2; /* Purple border on focus */
            outline: none;
            box-shadow: 0 0 5px rgba(138, 43, 226, 0.5); /* Subtle glow effect */
        }

        .rating input {
            margin-right: 10px;
        }

        .rating label {
            font-size: 1.5em;
            color: #4CAF50;
        }

        .submit-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.3em;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .submit-btn:hover {
            background-color: #45a049;
        }

        .thank-you-message {
            display: none;
            text-align: center;
            padding: 20px;
            background-color: #d4edda;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .thank-you-message h2 {
            font-size: 2em;
            color: #2e7d32;
        }

        .thank-you-message p {
            font-size: 1.1em;
            color: #333;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 20px;
            background-color: #2e7d32;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.2em;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #4CAF50;
        }
    </style>
</head>
<body>

    <div class="feedback-container">
        <h1>We Value Your Opinion</h1>
        <form id="feedbackForm">
            <div class="form-section">
                <label for="name">Your Name (Optional):</label>
                <input type="text" id="name" name="name">
            </div>
            <div class="form-section">
                <label for="email">Your Email (Optional):</label>
                <input type="email" id="email" name="email">
            </div>
            <div class="form-section">
                <label for="rating">How would you rate your overall experience?</label>
                <div class="rating">
                    <input type="radio" id="rating1" name="rating" value="1">
                    <label for="rating1">1</label>
                    <input type="radio" id="rating2" name="rating" value="2">
                    <label for="rating2">2</label>
                    <input type="radio" id="rating3" name="rating" value="3">
                    <label for="rating3">3</label>
                    <input type="radio" id="rating4" name="rating" value="4">
                    <label for="rating4">4</label>
                    <input type="radio" id="rating5" name="rating" value="5">
                    <label for="rating5">5</label>
                </div>
            </div>
            <div class="form-section">
                <label for="contentFeedback">How relevant and informative did you find the content?</label>
                <select id="contentFeedback" name="contentFeedback">
                    <option value="Very Relevant">Very Relevant</option>
                    <option value="Relevant">Relevant</option>
                    <option value="Not Relevant">Not Relevant</option>
                </select>
            </div>
            <div class="form-section">
                <label for="usability">How easy was it to navigate the website?</label>
                <select id="usability" name="usability">
                    <option value="Very Easy">Very Easy</option>
                    <option value="Easy">Easy</option>
                    <option value="Average">Average</option>
                    <option value="Difficult">Difficult</option>
                </select>
            </div>
            <div class="form-section">
                <label for="suggestions">What features would you like to see in the future?</label>
                <textarea id="suggestions" name="suggestions" rows="4"></textarea>
            </div>
            <div class="form-section">
                <label for="otherComments">Do you have any other comments or suggestions?</label>
                <textarea id="otherComments" name="otherComments" rows="4"></textarea>
            </div>
            <div class="form-section">
                <input type="checkbox" id="consent" name="consent" required>
                <label for="consent">By submitting, you agree to our privacy policy.</label>
            </div>
            <button type="submit" class="submit-btn">Submit Feedback</button>
        </form>

        <div class="thank-you-message" id="thankYouMessage">
            <h2>Thank You for Your Feedback!</h2>
            <p>Your feedback has been successfully submitted. We appreciate your time and effort.</p>
            <button onclick="goHome()">Go to Homepage</button>
        </div>
    </div>

    <script>
        const feedbackForm = document.getElementById('feedbackForm');
        const thankYouMessage = document.getElementById('thankYouMessage');

        feedbackForm.addEventListener('submit', function(event) {
            event.preventDefault(); // Prevents form from submitting to server

            // Display thank you message
            feedbackForm.style.display = 'none';
            thankYouMessage.style.display = 'block';
        });

        function goHome() {
            window.location.href = "homepage.html"; // Replace with the actual URL of your homepage
        }
    </script>

</body>
</html>
